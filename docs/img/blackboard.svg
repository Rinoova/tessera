<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400" font-family="DejaVu Sans, Arial, sans-serif">
  <rect x="1" y="1" width="878" height="398" rx="20" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>

  <!-- blackboard with wood frame -->
  <rect x="60" y="36" width="760" height="300" rx="12" fill="#6b4423" stroke="#4a2f18" stroke-width="2"/>
  <rect x="74" y="50" width="732" height="272" rx="5" fill="#14342a"/>

  <!-- chalk header -->
  <text x="102" y="88" font-size="17" font-weight="700" fill="#bfe3cf" letter-spacing="1.5">WHO'S WORKING HERE</text>
  <text x="392" y="88" font-size="15" fill="#7fae93">·   project: payments-api</text>
  <line x1="102" y1="100" x2="540" y2="100" stroke="#3f6b54" stroke-width="2" stroke-linecap="round"/>

  <!-- each agent announces what it's touching; the contested file (src/api.js) is amber -->
  <circle cx="114" cy="132" r="6" fill="#38bdf8"/>
  <text x="132" y="138" font-size="16.5" fill="#e6f0e8">agent A   ·   editing  <tspan font-weight="700" fill="#fcd34d">src/api.js</tspan></text>

  <circle cx="114" cy="168" r="6" fill="#a78bfa"/>
  <text x="132" y="174" font-size="16.5" fill="#e6f0e8">agent B   ·   editing  <tspan font-weight="700" fill="#ffffff">src/payments.ts</tspan></text>

  <circle cx="114" cy="204" r="6" fill="#34d399"/>
  <text x="132" y="210" font-size="16.5" fill="#e6f0e8">agent C   ·   just joined — reading  <tspan font-weight="700" fill="#ffffff">README.md</tspan></text>

  <!-- the newcomer D reaches for the SAME file as A -->
  <circle cx="114" cy="240" r="6" fill="#fbbf24"/>
  <text x="132" y="246" font-size="16.5" fill="#e6f0e8">agent D   ·   just joined — also editing  <tspan font-weight="700" fill="#fcd34d">src/api.js</tspan></text>

  <!-- the board spots the clash -->
  <polygon points="114,266 124,284 104,284" fill="#fb7185"/>
  <text x="114" y="282" font-size="13" font-weight="700" fill="#3f1320" text-anchor="middle">!</text>
  <text x="132" y="284" font-size="16.5" font-weight="700" fill="#fca5a5">A and D are both on src/api.js   →   coordinate!</text>

  <!-- caption -->
  <text x="440" y="372" font-size="15.5" fill="#94a3b8" text-anchor="middle">Because each agent writes what it's touching, D's clash with A is <tspan font-weight="700" fill="#cbd5e1">caught at once</tspan>.</text>
</svg>
