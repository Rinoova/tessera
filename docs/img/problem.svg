<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="DejaVu Sans, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="878" height="338" rx="20" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="46" font-size="18" font-weight="700" fill="#94a3b8">Without coordination — two agents, one file, at the same time</text>

  <!-- Agent A -->
  <rect x="40" y="86" width="214" height="120" rx="14" fill="#0b2740" stroke="#38bdf8" stroke-width="2"/>
  <text x="62" y="124" font-size="22" font-weight="700" fill="#7dd3fc">Agent A</text>
  <text x="62" y="156" font-size="16" fill="#cbd5e1">edits  src/api.js</text>
  <text x="62" y="182" font-size="15" fill="#94a3b8">+ input validation</text>

  <!-- Agent B -->
  <rect x="626" y="86" width="214" height="120" rx="14" fill="#2a1740" stroke="#a78bfa" stroke-width="2"/>
  <text x="648" y="124" font-size="22" font-weight="700" fill="#c4b5fd">Agent B</text>
  <text x="648" y="156" font-size="16" fill="#cbd5e1">edits  src/api.js</text>
  <text x="648" y="182" font-size="15" fill="#94a3b8">+ request logging</text>

  <!-- file -->
  <rect x="372" y="92" width="136" height="108" rx="12" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="440" y="132" font-size="17" font-weight="700" fill="#e2e8f0" text-anchor="middle">src/api.js</text>
  <line x1="392" y1="150" x2="488" y2="150" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
  <line x1="392" y1="168" x2="468" y2="168" stroke="#334155" stroke-width="6" stroke-linecap="round"/>

  <!-- arrows both writing -->
  <line x1="258" y1="140" x2="366" y2="146" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ar)"/>
  <line x1="622" y1="140" x2="514" y2="146" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="300" y="128" font-size="13" fill="#64748b">save</text>
  <text x="556" y="128" font-size="13" fill="#64748b">save</text>

  <!-- clash burst on the file's BOTTOM edge (no text there) -->
  <g transform="translate(0,98)">
    <polygon points="440,70 449,90 470,86 456,103 470,118 449,114 440,134 431,114 410,118 424,103 410,86 431,90"
             fill="#fb7185"/>
    <text x="440" y="107" font-size="18" font-weight="700" fill="#7f1d1d" text-anchor="middle">!</text>
  </g>

  <!-- consequence banner (widened so the text fits) -->
  <rect x="24" y="262" width="832" height="56" rx="12" fill="#3f1320" stroke="#fb7185" stroke-width="1.5"/>
  <polygon points="58,276 72,302 44,302" fill="#fbbf24"/>
  <text x="58" y="299" font-size="15" font-weight="700" fill="#1f2937" text-anchor="middle">!</text>
  <text x="86" y="296" font-size="15.5" fill="#fecaca">Both save at once → Agent A's changes are <tspan font-weight="700" fill="#fb7185">silently overwritten</tspan>. Lost work, no warning.</text>
</svg>
