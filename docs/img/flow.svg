<svg xmlns="http://www.w3.org/2000/svg" width="880" height="210" viewBox="0 0 880 210" font-family="DejaVu Sans, Arial, sans-serif">
  <defs>
    <marker id="fa" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="878" height="208" rx="20" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
  <text x="40" y="44" font-size="18" font-weight="700" fill="#94a3b8">Automatic — wired through Claude Code hooks, no agent cooperation needed</text>

  <!-- step 1 -->
  <rect x="30" y="66" width="250" height="118" rx="14" fill="#0e1b2a" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="60" cy="100" r="15" fill="#38bdf8"/>
  <text x="60" y="106" font-size="17" font-weight="700" fill="#0f172a" text-anchor="middle">1</text>
  <text x="86" y="106" font-size="18" font-weight="700" fill="#e2e8f0">Agent starts</text>
  <text x="52" y="138" font-size="13.5" fill="#94a3b8">SessionStart hook → writes</text>
  <text x="52" y="158" font-size="13.5" fill="#94a3b8">"I'm here", reads the board</text>

  <!-- step 2 -->
  <rect x="315" y="66" width="250" height="118" rx="14" fill="#0e1b2a" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="345" cy="100" r="15" fill="#a78bfa"/>
  <text x="345" y="106" font-size="17" font-weight="700" fill="#0f172a" text-anchor="middle">2</text>
  <text x="371" y="106" font-size="18" font-weight="700" fill="#e2e8f0">About to edit</text>
  <text x="337" y="138" font-size="13.5" fill="#94a3b8">PreToolUse hook → checks</text>
  <text x="337" y="158" font-size="13.5" fill="#94a3b8">the board for that file</text>

  <!-- step 3 -->
  <rect x="600" y="66" width="250" height="118" rx="14" fill="#0e1b2a" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="630" cy="100" r="15" fill="#34d399"/>
  <text x="630" y="106" font-size="17" font-weight="700" fill="#0f172a" text-anchor="middle">3</text>
  <text x="656" y="106" font-size="18" font-weight="700" fill="#e2e8f0">Coordinate</text>
  <text x="622" y="138" font-size="13.5" fill="#94a3b8">peer on the same file?</text>
  <text x="622" y="158" font-size="13.5" fill="#94a3b8">warn / block · else proceed</text>

  <!-- arrows -->
  <line x1="284" y1="125" x2="311" y2="125" stroke="#64748b" stroke-width="2.5" marker-end="url(#fa)"/>
  <line x1="569" y1="125" x2="596" y2="125" stroke="#64748b" stroke-width="2.5" marker-end="url(#fa)"/>
</svg>
